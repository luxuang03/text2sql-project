services:
  mariadb:
    image: mariadb:10.11
    container_name: text2sql_mariadb
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: movies_db
      MARIADB_USER: user
      MARIADB_PASSWORD: password
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./mariadb_init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    container_name: text2sql_backend
    depends_on:
      mariadb:
        condition: service_healthy
    ports:
      - "8003:8000"
    environment:
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_USER: user
      DB_PASSWORD: password
      DB_NAME: movies_db
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')"]
      interval: 30s
      timeout: 3s
      retries: 20

  frontend:
    build: ./frontend
    container_name: text2sql_frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8004:8000"
    environment:
      BACKEND_URL: http://backend:8000

volumes:
  mariadb_data:
