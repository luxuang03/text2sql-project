<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Frontend Esonero</title>
</head>
<body>
<h1>Frontend – Progetto Esonero</h1>

<ul>
    <li><a href="/schema">Visualizza schema</a></li>
</ul>

<h2>Search</h2>
<form action="/search" method="post">
    <input type="text" name="question" size="80" required>
    <br><br>
    <button type="submit">Cerca</button>
</form>

<h2>Add</h2>
<form action="/add" method="post">
    <textarea name="data_line" rows="4" cols="80" required></textarea>
    <br><br>
    <button type="submit">Aggiungi</button>
</form>

</body>
</html>
